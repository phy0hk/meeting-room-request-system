server {
    listen 10000;

    # Forwarding to your API (NO STRIPPING)
    location /api/ {
        # Removing the trailing slash here keeps the "/api/" in the request
        proxy_pass https://meeting-room-request-system-0awa.onrender.com;

        # Essential headers for Render's routing
        proxy_set_header Host meeting-room-request-system-0awa.onrender.com;
        proxy_ssl_server_name on;

        # Standard proxy headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Forwarding to your Frontend
    location / {
        proxy_pass https://meeting-room-request-system.onrender.com;

        proxy_set_header Host meeting-room-request-system.onrender.com;
        proxy_ssl_server_name on;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
